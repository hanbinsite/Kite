name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust-target: x86_64-unknown-linux-gnu
          - platform: macos-14
            target: aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - platform: windows-2022
            target: x86_64-pc-windows-msvc
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libssl-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Kite ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust-target }}

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Generate latest.json for updater
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Kite ${VERSION} — See https://github.com/hanbinsite/Kite/releases/tag/${{ github.ref_name }}",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "linux-x86_64": {
                "signature": "",
                "url": "https://github.com/hanbinsite/Kite/releases/download/${{ github.ref_name }}/kite_${VERSION}_amd64.AppImage.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "",
                "url": "https://github.com/hanbinsite/Kite/releases/download/${{ github.ref_name }}/kite_${VERSION}_x64.dmg"
              },
              "darwin-aarch64": {
                "signature": "",
                "url": "https://github.com/hanbinsite/Kite/releases/download/${{ github.ref_name }}/kite_${VERSION}_aarch64.dmg"
              },
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/hanbinsite/Kite/releases/download/${{ github.ref_name }}/kite_${VERSION}_x64-setup.exe"
              }
            }
          }
          EOF

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
